server {
    listen 80;

    # Sert les fichiers statiques depuis ce dossier
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Le frontend appelle /api/health, mais le backend expose /health
    # Ce reverse-proxy traduit la route et évite les problèmes CORS
    location /api/health {
        proxy_pass http://backend:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy générique pour toutes les autres routes /api/
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
