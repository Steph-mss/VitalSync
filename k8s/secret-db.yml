apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
# IMPORTANT : les valeurs doivent être encodées en base64
# Générer avec : echo -n "valeur" | base64
# Ne jamais commiter ce fichier avec de vraies valeurs en production.
# En production, utiliser un gestionnaire de secrets (Vault, AWS Secrets Manager, etc.)
data:
  DB_USER: dml0YWxzeW5jX3VzZXI=       # vitalsync_user
  DB_PASSWORD: c2VjcmV0cGFzc3dvcmQ=   # secretpassword
  DB_NAME: dml0YWxzeW5jX2Ri           # vitalsync_db
