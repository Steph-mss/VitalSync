apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vitalsync-ingress
  annotations:
    # Contrôleur Ingress utilisé (nginx est le plus répandu)
    kubernetes.io/ingress.class: "nginx"
    # Redirige automatiquement HTTP vers HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: vitalsync.example.com   # Remplacer par le vrai domaine
      http:
        paths:
          # Tout le trafic / est renvoyé vers le service frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          # Les appels /api/* sont renvoyés directement vers le backend
          # (optionnel si nginx dans le frontend fait déjà le proxy)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
  # Configuration TLS (certificat géré par cert-manager ou manuellement)
  tls:
    - hosts:
        - vitalsync.example.com
      secretName: vitalsync-tls-secret
